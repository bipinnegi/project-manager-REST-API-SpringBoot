# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# SQL Server (SQLEXPRESS)
# ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=saas_project_manager;encrypt=true;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Using Windows Authentication
spring.datasource.username=saas_user
spring.datasource.password=StrongPassword@123

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.application.name=projectmanager
